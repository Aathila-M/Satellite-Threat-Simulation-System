<!DOCTYPE html>
<html>

<head>

<title>Cyber Attack Map</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

.map{
position:relative;
width:800px;
height:400px;
margin:auto;
background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
background-size:cover;
}

.attack{
position:absolute;
width:10px;
height:10px;
background:red;
border-radius:50%;
animation:attack 1s infinite;
}

@keyframes attack{
0%{transform:scale(1)}
50%{transform:scale(2)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<h1>🌍 Global Cyber Attack Map</h1>

<div class="map">

<div class="attack" style="top:120px;left:200px"></div>
<div class="attack" style="top:200px;left:500px"></div>
<div class="attack" style="top:80px;left:350px"></div>

</div>

</body>

</html>
